# @package _global_

common:
  cpu: false
  tpu: false
  seed: 1
  fp16: false
  bf16: true
  memory_efficient_fp16: false
  memory_efficient_bf16: false
  amp: false
  profile: false
  reset_logging: false
  suppress_crashes: false
  model_parallel_size: 1
  empty_cache_freq: 0
  log_format: json
  log_file: null
  log_interval: 1
  tensorboard_logdir: outputs/animal2vec/tensorboard/smoke_16khz_5s_torch2
  min_loss_scale: 1e-6
  fp16_no_flatten_grads: true
  fp16_init_scale: 1

checkpoint:
  save_dir: outputs/animal2vec/checkpoints/smoke_16khz_5s_torch2
  restore_file: checkpoint_last.pt
  optimizer_overrides: "{}"
  no_save: true
  no_epoch_checkpoints: true
  no_last_checkpoints: true
  save_interval_updates: 0
  keep_interval_updates_pattern: -1

task:
  _name: audio_ccas
  data: data/animal2vec/manifest
  unique_labels: "['beep', 'synch', 'sn', 'cc', 'ld', 'oth', 'mo', 'al', 'soc', 'agg', 'eating', 'focal']"
  conv_feature_layers: '[(64, 63, 1)] + [(128, 10, 5)] + [(128, 3, 2)] * 3 + [(128, 3, 1)] + [(128, 2, 1)] * 2'
  max_sample_size: 80000
  min_sample_size: 80000
  sample_rate: 16000
  normalize: true
  with_labels: false
  verbose_tensorboard_logging: false
  enable_padding: false

dataset:
  num_workers: 2
  data_buffer_size: 10
  max_tokens: 80000
  skip_invalid_size_inputs_valid_test: true
  validate_interval: 1
  validate_interval_updates: 10000
  validate_after_updates: 0
  required_batch_size_multiple: 1
  disable_validation: true
  curriculum: 0
  train_subset: pretrain
  valid_subset: valid_0

distributed_training:
  distributed_world_size: 1
  distributed_num_procs: 1
  distributed_rank: 0
  distributed_backend: nccl
  distributed_init_method: null
  distributed_port: -1
  device_id: 0
  distributed_no_spawn: false
  ddp_backend: legacy_ddp
  nprocs_per_node: 1
  pipeline_model_parallel: false
  fp16: ${common.fp16}
  memory_efficient_fp16: ${common.memory_efficient_fp16}
  tpu: ${common.tpu}
  find_unused_parameters: false
  gradient_as_bucket_view: false
  broadcast_buffers: false
  bucket_cap_mb: 25
  heartbeat_timeout: -1
  slowmo_momentum: null
  slowmo_base_algorithm: localsgd
  localsgd_frequency: 3
  zero_sharding: none
  cpu_offload: false
  use_sharded_state: false
  not_fsdp_flatten_parameters: false

criterion:
  _name: expanded_model
  segmentation_metrics: false
  use_focal_loss: true
  log_keys:
    - ema_decay
    - target_var
    - pred_var
    - model_norm
    - ema_norm
    - masked_pct

optimization:
  lr: [0.0001]
  update_freq: [1]
  max_update: 2
  stop_min_lr: -1.0
  stop_time_hours: 0.0
  clip_norm: 1.0

optimizer:
  _name: adam
  adam_betas: [0.9, 0.98]
  adam_eps: 1e-06
  weight_decay: 0.01

lr_scheduler:
  _name: cosine
  warmup_updates: 1

ema:
  store_ema: false

model:
  _name: data2vec_multi
  loss_beta: 0
  loss_scale: null
  torch_compile: false
  torch_compile_backend: inductor
  torch_compile_scope: full
  torch_compile_mode: reduce-overhead
  torch_compile_fullgraph: false
  torch_compile_dynamic: true
  torch_compile_suppress_errors: true

  depth: 2
  embed_dim: 128
  num_heads: 4

  clone_batch: 2

  ema_decay: 0.9997
  ema_end_decay: 1
  ema_anneal_end_step: 300000
  ema_encoder_only: false

  average_top_k_layers: 2
  instance_norm_target_layer: true
  layer_norm_target_layer: false
  layer_norm_targets: false

  layerdrop: 0
  norm_eps: 1e-5

  supported_modality: AUDIO
  target_mixup: false
  source_mixup: 0.5
  mixup_prob: 1.0
  same_mixup: true
  mixing_window_length: 0.05
  gain_mode: A_weighting

  modalities:
    audio:
      sample_rate: 16000
      sinc_input: true
      apply_window_to_root: false
      use_pswish: true
      sinc_norm: layer_norm
      conv_pos_depth: 2
      conv_pos_width: 31
      conv_pos_groups: 4
      prenet_depth: 2
      mask_prob: 1.5
      mask_length: 2
      mask_prob_adjust: 0.05
      inverse_mask: false
      mask_noise_std: 0.01
      mask_dropout: 0
      add_masks: false
      ema_local_encoder: false
      use_alibi_encoder: true
      prenet_layerdrop: 0
      prenet_dropout: 0.1
      learned_alibi_scale: true
      learned_alibi_scale_per_head: true
      decoder:
        input_dropout: 0.1
        decoder_dim: 128
        decoder_groups: 4
        decoder_kernel: 7
        decoder_layers: 1
