    only_new_files: true
    delete_downloaded_after_processing: true
    max_files_per_deployment: null
    download_workers: 4
    random_seed: 42
    assume_sample_rate_hz: 48000
    sample_bits: 16
    channels: 1
    deployment_prefixes:
