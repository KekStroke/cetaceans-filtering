# Orcasound (AWS Open Data)
orcasound_output_dir: orcasound
orcasound_only_new_files: true
orcasound_max_files_per_source: null
orcasound_target_hours_total: null
orcasound_assume_minutes_per_file: 5.0
orcasound_duration_min_minutes: null
orcasound_duration_max_minutes: null
orcasound_random_seed: 42
orcasound_assume_sample_rate_hz: 48000
orcasound_delete_downloaded_after_processing: true
orcasound_delete_nonmatching_downloads: true
orcasound_selected_prefixes: null
# Optional override for DEFAULT_SOURCES from download_orcasound.py:
# orcasound_sources:
#   - bucket: acoustic-sandbox
#     prefix: 2019-Orcasound-examples/
# Optional source subset from DEFAULT_SOURCES:
# orcasound_selected_prefixes:
#   - 2019-Orcasound-examples/
#   - humpbacks/
# Optional duration filtering by file length:
# orcasound_duration_min_minutes: 4.0
# orcasound_duration_max_minutes: 6.0

# Pacific Sound
pacific_sound_output_dir: pacific_sound
pacific_sound_tier: 256khz # 256khz, 16khz, 2khz
pacific_sound_years: [2016, 2017, 2023] # starting from 2015
pacific_sound_months: ["11", "12"] # null means all months

# train_dataset_path: data/orcasound/audio_train
# val_dataset_path: data/orcasound/audio_val

train_dataset_path: /mnt/shared_ru.ml.SZ-2_000180/Iskhakov/datasets/audio/marine-mammal/orcasound/audio_train
val_dataset_path: /mnt/shared_ru.ml.SZ-2_000180/Iskhakov/datasets/audio/marine-mammal/orcasound/audio_val

sample_rate: 24000
segment_duration: 10 # sec
segments_duration_filtering_factor: 1.2 # should be >= 1
random_segment: True

batch_size: 32
num_workers: 16
