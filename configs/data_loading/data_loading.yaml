  # Used by utils/datasets_downloads/download_orcasound.py
  orcasound:
    output_dir_name: orcasound
    only_new_files: true
    max_files_per_source: null
    download_workers: 4
    target_hours_total: null
    assume_minutes_per_file: 5.0
    duration_min_minutes: null
    duration_max_minutes: null
    random_seed: 42
    assume_sample_rate_hz: 48000
    delete_downloaded_after_processing: true
    delete_nonmatching_downloads: true
    selected_prefixes: null
    # Optional override for DEFAULT_SOURCES from download_orcasound.py:
    # sources:
    #   - bucket: acoustic-sandbox
    #     prefix: 2019-Orcasound-examples/
    # Optional source subset from DEFAULT_SOURCES:
    # selected_prefixes:
    #   - 2019-Orcasound-examples/
    #   - humpbacks/
    # Optional duration filtering by file length:
    # duration_min_minutes: 4.0
    # duration_max_minutes: 6.0

  # Used by utils/datasets_downloads/download_pacific_sound.py
  pacific_sound:
    output_dir_name: pacific_sound
    tier: 256khz # 256khz, 16khz, 2khz
    download_workers: 4
    years: [2016, 2017, 2023] # starting from 2015
    months: ["11", "12"] # null means all months

  # Used by utils/datasets_downloads/download_voices_in_the_sea.py
  voices_in_the_sea:
    output_dir_name: voices_in_the_sea
    download_workers: 4
    base_url: https://voicesinthesea.ucsd.edu/species/spectrogramPlayerComponents/audio/
    include_dirs: []
    tmp_dir_name: voices_in_the_sea

  # Used by utils/datasets_downloads/download_watkins.py
  watkins:
    output_dir_name: watkins
    hf_name: confit/wmms-parquet
    splits: [train, test]
    progress_every: 50

  # Used by utils/datasets_downloads/download_onc_hydrophones.py
  onc:
    token: null # omit and use ONC_TOKEN
    output_dir_name: onc
    tmp_dir_name: _tmp_onc
    split_by: auto # auto | location_code | device_code
    delete_downloaded_after: true
    download_workers: 2
    progress_every: 50
    device_category_code: HYDROPHONE
    default_archive_params: {} # optional shared camelCase filters
    extra_params: {} # optional global extras
    targets:
      - location_code: SCVIP
        date_from: "2021-05-01"
        date_to: "2021-05-02"
        extension: flac
        include_diverted: false
        max_files: 5
        subfolder: null # override output folder name
        device_category_code: null # per-target category override
        extra_params: {} # merges into getArchivefile params
